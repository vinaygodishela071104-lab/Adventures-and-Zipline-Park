<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyRush Forgot Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="forget.css">
<link rel="icon" href="images/logo1-removebg-preview.png" type="image/png">
</head>
<body>

<!-- BACKGROUND -->

<div class="background"></div>

<!-- FORGOT PASSWORD -->

<div class="forgot-container">

  <div class="forgot-card">

<div class="nav-actions">

  <button class="rtl-btn" onclick="toggleRTL()">
    RTL
  </button>

  <button class="theme-btn" onclick="toggleTheme()">
    ☾
  </button>

</div>
    <!-- LOGO -->

    <a href="index.html" class="logo">
      <span>Sky</span>Rush
    </a>

    <!-- TEXT -->

    <div class="forgot-text">

      <h1>Forgot Password?</h1>

      <p>
        Don’t worry. Enter your registered email address
        and we’ll send you a password reset link.
      </p>

    </div>

    <!-- FORM -->

    <form class="forgot-form">

      <div class="form-group">

        <label>Email Address</label>

        <input type="email" placeholder="Enter your email">

      </div>

      <!-- INFO -->

      <div class="info-box">

        <p>
          Make sure you enter the same email address
          used while creating your SkyRush account.
        </p>

      </div>

      <!-- BUTTON -->

      <button type="submit" class="reset-btn">
        Send Reset Link
      </button>

    </form>

    <!-- LOGIN -->

    <div class="back-login">

      Remember your password?
      <a href="login.html">Back to Login</a>

    </div>

  </div>

</div>
<script src="login.js"></script>

</body>
</html>

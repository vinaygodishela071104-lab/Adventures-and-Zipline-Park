<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyRush Sign Up</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="signin.css">
<link rel="icon" href="images/logo1-removebg-preview.png" type="image/png">
</head>
<body>



<div class="background"></div>

<!-- SIGNUP -->

<div class="signup-container">

  <div class="signup-card">
    <div class="nav-actions">

  <button class="rtl-btn" onclick="toggleRTL()">
    RTL
  </button>

  <button class="theme-btn" onclick="toggleTheme()">
    ☾
  </button>

</div>

    <!-- LOGO -->

    <a href="index.html" class="logo">
      <span>Sky</span>Rush
    </a>

    <!-- TEXT -->

    <div class="signup-text">

      <h1>Create Account</h1>

      <p>
        Join SkyRush and start your next thrilling outdoor adventure journey.
      </p>

    </div>

    <!-- FORM -->

    <form class="signup-form">

      <div class="form-grid">

        <div class="form-group">

          <label>First Name</label>

          <input type="text" placeholder="Enter first name">

        </div>

        <div class="form-group">

          <label>Last Name</label>

          <input type="text" placeholder="Enter last name">

        </div>

      </div>

      <div class="form-group">

        <label>Email Address</label>

        <input type="email" placeholder="Enter your email">

      </div>

      <div class="form-group">

        <label>Phone Number</label>

        <input type="text" placeholder="Enter phone number">

      </div>

      <div class="form-grid">

        <div class="form-group">

          <label>Password</label>

          <input type="password" placeholder="Create password">

        </div>

        <div class="form-group">

          <label>Confirm Password</label>

          <input type="password" placeholder="Confirm password">

        </div>

      </div>

      <!-- TERMS -->

      <div class="terms">

        <input type="checkbox">

        <p>
          I agree to the <a href="#">Terms & Conditions</a>
          and <a href="#">Privacy Policy</a>
        </p>

      </div>

      <!-- BUTTON -->

      <button type="submit" class="signup-btn">
        Create Account
      </button>

      <!-- DIVIDER -->

      <div class="divider">

        <span>OR SIGN UP WITH</span>

      </div>

      <!-- SOCIAL -->

      <div class="social-login">

        <button class="social-btn">
          Google
        </button>

        <button class="social-btn">
          Facebook
        </button>

      </div>

    </form>

    <!-- LOGIN -->

    <div class="login-link">

      Already have an account?
      <a href="login.html">Login</a>

    </div>

  </div>

</div>
<script src="login.js"></script>

</body>
</html>
